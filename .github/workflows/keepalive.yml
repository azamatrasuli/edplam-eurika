name: Keep Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch: {}  # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping backend
        run: |
          curl -s -m 120 "${{ secrets.BACKEND_URL }}/health" || echo "Server waking up..."
